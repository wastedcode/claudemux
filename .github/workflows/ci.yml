# claudemux CI — the substrate's required-check workflow.
#
# Two job lanes:
#   - `gates`: lint, typecheck, public-surface + safety greps, npm-pack
#     assertion. Runs on every push/PR — cheap and structural.
#   - `matrix`: full test suite against tmux 3.2 / 3.4 / 3.5a × {ubuntu, macos}.
#     Floor is 3.2 — `new-session -e` (used to set per-session env) is 3.2+.
#     Tmux is installed from source per cell (apt's default tmux doesn't
#     cover the version matrix); the build is cached so re-runs are fast.

name: ci

on:
  push:
    branches: [main, "init/**"]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: biome check
        run: npm run check
      - name: typecheck
        run: npm run typecheck
      - name: build
        run: npm run build
      - name: safety-grep
        run: bash scripts/safety-grep.sh .
      - name: layering-grep
        run: bash scripts/layering-grep.sh .
      - name: no-tmux-in-public
        run: bash scripts/no-tmux-in-public.sh .
      - name: assert-npm-pack
        run: bash scripts/assert-npm-pack.sh .

  matrix:
    needs: gates
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        tmux: ["3.2a", "3.4", "3.5a"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache tmux build
        id: cache-tmux
        uses: actions/cache@v4
        with:
          path: ~/tmux-${{ matrix.tmux }}/install
          key: tmux-${{ matrix.tmux }}-${{ matrix.os }}-v2

      - name: Install tmux build deps (Linux)
        if: runner.os == 'Linux' && steps.cache-tmux.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libncurses-dev bison pkg-config

      - name: Install tmux build deps (macOS)
        if: runner.os == 'macOS' && steps.cache-tmux.outputs.cache-hit != 'true'
        run: brew install libevent ncurses bison pkg-config automake autoconf

      - name: Build tmux ${{ matrix.tmux }} from source
        if: steps.cache-tmux.outputs.cache-hit != 'true'
        run: |
          cd ~
          curl -fsSL -o tmux.tar.gz \
            "https://github.com/tmux/tmux/releases/download/${{ matrix.tmux }}/tmux-${{ matrix.tmux }}.tar.gz"
          mkdir -p tmux-${{ matrix.tmux }}
          tar xzf tmux.tar.gz -C tmux-${{ matrix.tmux }} --strip-components 1
          cd tmux-${{ matrix.tmux }}
          # Build WITHOUT utf8proc. macOS tmux configure refuses to proceed
          # without an explicit utf8proc choice, so pass --disable-utf8proc
          # rather than omit the flag. Why disabled: --enable-utf8proc links
          # Homebrew's libutf8proc dynamically, and that dylib is ABSENT on
          # cache-HIT runs (the brew-install step is gated on cache-miss) — so
          # `tmux -V` aborts with "Library not loaded: …/libutf8proc.3.dylib".
          # Linux already builds with no utf8proc and its suite is green, so
          # tmux's built-in width tables are sufficient for the ❯ ready-marker
          # and pane classifier. A self-contained binary is cache-safe.
          UTF8PROC_FLAG=""
          if [ "$RUNNER_OS" = "macOS" ]; then
            UTF8PROC_FLAG="--disable-utf8proc"
          fi
          ./configure --prefix=$HOME/tmux-${{ matrix.tmux }}/install $UTF8PROC_FLAG
          make -j2
          make install

      - name: Put tmux ${{ matrix.tmux }} on PATH
        run: |
          echo "$HOME/tmux-${{ matrix.tmux }}/install/bin" >> $GITHUB_PATH

      - name: Verify tmux version
        run: tmux -V

      # No `claude` install: the suite is hermetic. Real-claude tests (pre-auth
      # boot + the post-auth `*.live.test.ts` set) are gated out of `npm test`
      # and run only as acceptance — see scripts/*.mjs and the CLAUDEMUX_LIVE_*
      # env flags. CI exercises real tmux, never real claude.
      - run: npm ci
      - run: npm run build
      - run: npm test
