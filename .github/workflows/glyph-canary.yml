name: claude ❯ glyph canary

# Catches upstream regressions in the U+276F (❯) glyph claude uses as its
# REPL ready marker. Allowed to fail — does NOT block PRs. On failure,
# opens (or comments on) a tracking issue so a human sees it within a
# release cycle of upstream claude.
#
# Reference: research/findings.md §3.

on:
  schedule:
    # 07:17 UTC daily — off-peak; staggered minute to avoid the top-of-hour rush.
    - cron: '17 7 * * *'
  workflow_dispatch:   # manual trigger via `gh workflow run glyph-canary.yml`

# Non-blocking by design — branch protection MUST NOT require this check.
permissions:
  contents: read
  issues: write       # required so the failure path can open/comment a tracking issue

jobs:
  canary:
    runs-on: ubuntu-latest
    continue-on-error: true   # job-level: this is a soft check
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install claude (latest)
        # Pinning to a specific version defeats the canary's purpose
        # (the whole point is to catch upstream drift). Document the
        # version under test in the job summary.
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Record claude version
        id: claude_version
        continue-on-error: true
        run: |
          ver=$(claude --version 2>&1 || echo "unknown")
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Claude version under test: $ver" >> "$GITHUB_STEP_SUMMARY"

      - name: Run glyph probe
        id: probe
        continue-on-error: true   # step-level: don't bubble up as job failure
        run: |
          set -u
          # Sandbox HOME — keeps every probe ephemeral.
          export HOME_SANDBOX="$(mktemp -d -t claudemux-canary-XXXXXX)"
          export HOME="$HOME_SANDBOX"
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_CACHE_HOME="$HOME/.cache"
          export XDG_DATA_HOME="$HOME/.local/share"
          export XDG_STATE_HOME="$HOME/.local/state"
          mkdir -p "$XDG_CONFIG_HOME" "$XDG_CACHE_HOME" "$XDG_DATA_HOME" "$XDG_STATE_HOME"
          export TMUX_SOCKET="claudemux-canary"

          # NOTE: production credentials are NOT staged in this sandbox. The
          # canary therefore only reaches the pre-auth boot dialogs (theme
          # picker, login method) — both of which use ❯ (U+276F) as the
          # menu selection indicator. That is enough to detect the
          # specific failure mode this canary exists to catch: upstream
          # dropping or renaming the glyph entirely. A creds-staged
          # follow-up (separate workflow) is the right place to verify
          # the REPL ready-marker form once substrate ships.
          tmux -L "$TMUX_SOCKET" -f /dev/null new-session -d -s ka 'sleep 30'
          tmux -L "$TMUX_SOCKET" new-session -d -s c -x 120 -y 40 \
            "env -i HOME=$HOME XDG_CONFIG_HOME=$XDG_CONFIG_HOME XDG_DATA_HOME=$XDG_DATA_HOME XDG_CACHE_HOME=$XDG_CACHE_HOME XDG_STATE_HOME=$XDG_STATE_HOME PATH=/home/runner/.local/bin:/usr/local/bin:/usr/bin:/bin TERM=xterm-256color LC_ALL=C.UTF-8 claude"
          sleep 6

          tmux -L "$TMUX_SOCKET" capture-pane -p -t c > /tmp/pane.txt
          tmux -L "$TMUX_SOCKET" kill-server 2>/dev/null || true

          # Assert U+276F appears in the captured pane. Use python so the
          # byte/char check is unambiguous (don't depend on locale/grep).
          if python3 - <<'PY'
          import sys
          with open('/tmp/pane.txt', 'r', encoding='utf-8') as f:
              if '❯' in f.read():
                  sys.exit(0)
              sys.exit(1)
          PY
          then
            echo "PASS: U+276F (❯) present in claude boot output" >> "$GITHUB_STEP_SUMMARY"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "FAIL: U+276F (❯) NOT found in claude boot output" >> "$GITHUB_STEP_SUMMARY"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            {
              echo
              echo "## Captured pane (first 60 lines)"
              echo '```'
              head -60 /tmp/pane.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Open or comment tracking issue on failure
        if: steps.probe.outputs.ok == 'false'
        uses: actions/github-script@v7
        env:
          # Move the version string out of the inline JS template literal
          # to avoid GHA template-injection via a malformed `claude --version`
          # output containing backticks or ${…}. Per GHA docs: pass via env
          # and read with process.env in the script.
          CLAUDE_VERSION: ${{ steps.claude_version.outputs.version }}
        with:
          script: |
            const title = 'glyph-canary: U+276F (❯) regression in claude';
            const body = [
              `Claude version under test: \`${process.env.CLAUDE_VERSION}\``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `The daily canary asserts \`U+276F\` (❯) appears in claude's boot output. It did not.`,
              `This is non-blocking — investigate before the next claudemux release; the classifier's idle predicate may need updating.`,
            ].join('\n');

            // Look for an existing open issue with the same title (avoid duplicates).
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'glyph-canary',
              per_page: 50,
            });
            const match = existing.data.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['glyph-canary'],
              });
            }
