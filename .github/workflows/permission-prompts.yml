name: permission-prompts fixture re-validation

# Re-validates the permission-prompt classifier fixture by replaying each
# scenario's trigger inside a `docker run --network=none --read-only`
# container. If the recorded `promptTextSnippet` no longer appears in the
# captured pane for a scenario, the classifier predicate is drifting from
# upstream claude and we must update before shipping.
#
# Network isolation is applied to the *test step* (via `docker run`), not
# to the *install step*. The install step runs on the plain runner where
# `apt-get` / `curl` / `npm i` can reach the network; the test container
# inherits the installed binaries via a one-off Docker image baked at job
# time. This is the remediation for security-audit F1:
#   brain/initiatives/claudemux-v0-0-1-pre-build-research/security-audit.md
#
# Reference: research/findings.md §4.

on:
  push:
    paths:
      - 'research/fixtures/**'
      - '.github/workflows/permission-prompts.yml'
      - 'agents/claude.ts'
  pull_request:
    paths:
      - 'research/fixtures/**'
      - '.github/workflows/permission-prompts.yml'
      - 'agents/claude.ts'
  schedule:
    # Daily 06:43 UTC for drift detection independent of merge cadence.
    - cron: '43 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-fixture:
    name: Validate fixture schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install tsx
        run: npm i -D tsx
      - name: Validate fixture schema
        run: npx tsx research/fixtures/validate-fixture.ts

  replay-scenarios:
    name: Replay fixture scenarios under --network=none docker
    runs-on: ubuntu-latest
    needs: validate-fixture
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Count scenarios in fixture
        id: count
        run: |
          set -euo pipefail
          n=$(node -e "console.log(require('./research/fixtures/permission-prompt-classifier-fixture.json').scenarios.length)")
          echo "n=$n" >> "$GITHUB_OUTPUT"
          echo "Fixture has $n scenarios."

      - name: Install test deps (vitest+tsx) on runner
        run: |
          set -euo pipefail
          npm i -D vitest tsx

      - name: Replay (empty fixture path — vitest self-skips on plain runner)
        if: steps.count.outputs.n == '0'
        run: |
          set -euo pipefail
          # The empty-fixture case is harmless: the Vitest suite checks
          # scenarios.length and skips. Running it on the plain runner is
          # safe because the test never invokes claude.
          npx vitest run research/fixtures/permission-prompts.test.ts --reporter=verbose

      - name: Build isolation image (populated fixture only)
        if: steps.count.outputs.n != '0'
        run: |
          set -euo pipefail
          # The image build needs network; it runs as a plain runner step,
          # NOT inside the network=none container. The image bakes in
          # tmux + node + claude + vitest/tsx so the network=none test step
          # has nothing left to install.
          version=$(node -e "console.log(require('./research/fixtures/permission-prompt-classifier-fixture.json').claudeVersion)")
          echo "Building isolation image with claude pinned to: $version"

          mkdir -p .ci/permission-prompts-image
          cp -r node_modules .ci/permission-prompts-image/node_modules
          cp package.json .ci/permission-prompts-image/package.json 2>/dev/null || true
          cat > .ci/permission-prompts-image/Dockerfile <<'DOCKERFILE'
          FROM node:20-bookworm-slim
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update \
            && apt-get install -y --no-install-recommends tmux curl ca-certificates jq python3 \
            && curl -fsSL https://claude.ai/install.sh | bash \
            && rm -rf /var/lib/apt/lists/*
          ENV PATH="/root/.local/bin:${PATH}"
          WORKDIR /work
          COPY node_modules /work/node_modules
          DOCKERFILE
          docker build -t claudemux-prompts-test:ci .ci/permission-prompts-image

      - name: Replay (populated fixture — under --network=none --read-only)
        if: steps.count.outputs.n != '0'
        run: |
          set -euo pipefail
          # Isolation is applied to THIS step, not to the install steps
          # above. --network=none means: claude in the container cannot
          # reach Anthropic's API, so the recorded promptTextSnippet must
          # come purely from claude's local UI rendering. --read-only +
          # tmpfs means: the test cannot persist anywhere outside the
          # sandbox.
          docker run --rm \
            --network=none \
            --read-only \
            --tmpfs /tmp:rw,exec,size=512m \
            --tmpfs /run:rw,exec,size=64m \
            --tmpfs /home/runner:rw,exec,size=512m \
            -v "$PWD:/work:ro" \
            -w /work \
            -e HOME=/home/runner \
            -e LC_ALL=C.UTF-8 \
            claudemux-prompts-test:ci \
            sh -c '
              # Belt-and-braces inside the container as well — refuses to
              # run if cwd or HOME somehow look real after isolation.
              set -euo pipefail
              cwd=$(pwd)
              case "$cwd" in /|/root|/home/*) [ "$cwd" = "/work" ] || { echo "cwd $cwd"; exit 1; } ;; esac
              [ "$HOME" = "/home/runner" ] || { echo "HOME=$HOME unexpected"; exit 1; }
              mkdir -p "$HOME"
              npx vitest run research/fixtures/permission-prompts.test.ts --reporter=verbose
            '
